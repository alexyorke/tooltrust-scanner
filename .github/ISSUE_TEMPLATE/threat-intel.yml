name: Threat Intel Report
description: New MCP security research to evaluate for rule coverage
labels: ["threat-intel"]
body:
  - type: input
    id: source
    attributes:
      label: Source
      placeholder: "e.g. Koi Security, Invariant Labs, Embrace The Red"
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL
      placeholder: "https://..."
    validations:
      required: true
  - type: input
    id: date
    attributes:
      label: Date published
      placeholder: "e.g. 2026-03-28"
    validations:
      required: true
  - type: textarea
    id: attack-pattern
    attributes:
      label: Attack pattern
      placeholder: Describe the attack technique documented in the post
    validations:
      required: true
  - type: checkboxes
    id: coverage
    attributes:
      label: ToolTrust coverage
      options:
        - label: Existing rule covers this
        - label: Rule needs pattern update
        - label: New rule needed
        - label: Needs source-code analysis (not coverable today)
  - type: checkboxes
    id: test-fixture
    attributes:
      label: Test fixture added?
      options:
        - label: "Yes — added to `tests/fixtures/`"
  - type: textarea
    id: candidate-iocs
    attributes:
      label: Candidate IOCs
      description: Paste structured IOC candidates using .github/ioc-candidates.schema.json when possible
      placeholder: |
        [
          {
            "ecosystem": "npm",
            "ioc_type": "package_name",
            "value": "plain-crypto-js",
            "confidence": "high",
            "reason": "Observed in malicious package metadata",
            "source": "https://...",
            "first_seen": "2026-03-31",
            "suggested_action": "flag",
            "promote_to": "npm_iocs"
          }
        ]
