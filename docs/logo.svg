<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!--
      Weave technique: draw pill2 on top of pill1 everywhere (giving pill2 over
      at the top+bottom crossings). Then redraw pill1 clipped to the left and
      right crossing regions so pill1 appears on top there.
      Result: alternating over-under at all 4 crossing points.

      Crossing points (shortHalf=33, distance = 33*√2 ≈ 46.7 from center 256,256):
        LEFT  (209, 256)   RIGHT (303, 256)
        TOP   (256, 209)   BOTTOM (256, 303)
    -->
    <clipPath id="left-over">
      <circle cx="209" cy="256" r="44"/>
    </clipPath>
    <clipPath id="right-over">
      <circle cx="303" cy="256" r="44"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="76" fill="#09090b"/>

  <!-- Shield — rounded top corners, pointed bottom -->
  <path d="M 256,66
           C 310,66 406,100 418,142
           L 418,266
           Q 404,396 256,464
           Q 108,396 94,266
           L 94,142
           C 106,100 202,66 256,66
           Z"
        fill="#09090b"
        stroke="#10B981"
        stroke-width="22"
        stroke-linejoin="round"/>

  <!-- Knot: pill of 220×66, rx=33, centered at (256,256) -->

  <!-- Pill 1 at +45°  (drawn first — will be covered by pill2 at top+bottom crossings) -->
  <rect x="146" y="223" width="220" height="66" rx="33" ry="33"
        fill="#09090b" stroke="#10B981" stroke-width="15"
        transform="rotate(45,256,256)"/>

  <!-- Pill 2 at −45°  (drawn on top → pill2 wins at top + bottom crossings) -->
  <rect x="146" y="223" width="220" height="66" rx="33" ry="33"
        fill="#09090b" stroke="#10B981" stroke-width="15"
        transform="rotate(-45,256,256)"/>

  <!-- Restore pill 1 at LEFT crossing  (pill1 over pill2 here) -->
  <rect x="146" y="223" width="220" height="66" rx="33" ry="33"
        fill="#09090b" stroke="#10B981" stroke-width="15"
        transform="rotate(45,256,256)"
        clip-path="url(#left-over)"/>

  <!-- Restore pill 1 at RIGHT crossing (pill1 over pill2 here) -->
  <rect x="146" y="223" width="220" height="66" rx="33" ry="33"
        fill="#09090b" stroke="#10B981" stroke-width="15"
        transform="rotate(45,256,256)"
        clip-path="url(#right-over)"/>
</svg>
